<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Slug}} - Resume | Apsthira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080b11;
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.35);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Top navigation header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: rgba(13, 18, 30, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-badge {
            background: linear-gradient(135deg, var(--primary) 0%, #8b5cf6 100%);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        .logo-title {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .metadata-section {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .meta-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .meta-val {
            font-size: 0.88rem;
            font-weight: 500;
            color: #e2e8f0;
        }

        /* PDF Viewer Layout */
        .viewer-container {
            flex-grow: 1;
            position: relative;
            background: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #1f2937;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <div class="logo-badge">A</div>
            <div class="logo-title">Apsthira</div>
        </div>
        
        <div class="metadata-section">
            <div class="meta-item">
                <span class="meta-label">Original File</span>
                <span class="meta-val" id="header-filename">{{.OriginalFilename}}</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Last Updated</span>
                <span class="meta-val" id="header-updated">{{.UpdatedAt.Format "Jan 02, 2006 at 03:04 PM"}}</span>
            </div>
        </div>
    </header>

    <div class="viewer-container">
        <!-- Securely loads the PDF from the raw streaming endpoint -->
        <iframe src="/r/{{.Slug}}/raw" id="pdf-viewer"></iframe>
    </div>
</body>
</html>
